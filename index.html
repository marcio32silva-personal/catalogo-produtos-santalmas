<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo de Produtos Santalmas</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --ink: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --dark: #020617;
      --blue: #2563eb;
      --blue-bg: #eff6ff;
      --shadow: 0 18px 45px rgba(15,23,42,.08);
      --shadow-soft: 0 8px 24px rgba(15,23,42,.06);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37,99,235,.12), transparent 34%),
        radial-gradient(circle at top right, rgba(16,185,129,.10), transparent 30%),
        var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    .app {
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 14px;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(245,247,251,.92);
      backdrop-filter: blur(12px);
      padding: 12px 0 14px;
    }

    .hero {
      background: rgba(255,255,255,.95);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius: 26px;
      padding: 16px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(24px, 7vw, 40px);
      line-height: .95;
      font-weight: 950;
      letter-spacing: -.055em;
    }

    .search {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    input, button {
      font-family: inherit;
    }

    .search input {
      width: 100%;
      border: 1px solid #cbd5e1;
      background: #fff;
      color: var(--ink);
      border-radius: 18px;
      padding: 15px 15px;
      font-size: 16px;
      font-weight: 850;
      outline: none;
      min-width: 0;
    }

    .search input:focus {
      border-color: var(--dark);
      box-shadow: 0 0 0 4px rgba(15,23,42,.08);
    }

    .search button {
      border: 0;
      background: var(--dark);
      color: white;
      border-radius: 18px;
      padding: 0 16px;
      font-size: 11px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .08em;
      cursor: pointer;
    }

    .status {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin: 12px 2px 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .card {
      background: rgba(255,255,255,.96);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-soft);
      display: flex;
      flex-direction: column;
    }

    .photo {
      aspect-ratio: 4/3;
      background: linear-gradient(135deg, #e2e8f0, #f8fafc);
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 11px;
      font-weight: 950;
      text-transform: uppercase;
      overflow: hidden;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: white;
      cursor: pointer;
    }

    .body {
      padding: 13px;
      display: grid;
      gap: 8px;
      flex: 1;
    }

    .code {
      width: fit-content;
      display: inline-flex;
      background: var(--blue-bg);
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 950;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .name {
      margin: 0;
      font-size: 16px;
      line-height: 1.12;
      font-weight: 950;
      letter-spacing: -.035em;
    }

    .small {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      font-weight: 750;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 7px;
      margin-top: auto;
    }

    .btn {
      border: 1px solid var(--line);
      background: white;
      color: var(--ink);
      border-radius: 14px;
      padding: 11px 10px;
      font-size: 11px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .04em;
      cursor: pointer;
    }

    .btn.dark {
      background: var(--dark);
      border-color: var(--dark);
      color: white;
    }

    .empty {
      grid-column: 1/-1;
      background: white;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-soft);
      padding: 42px 16px;
      text-align: center;
      color: var(--muted);
      font-weight: 850;
      line-height: 1.35;
    }

    .toast {
      position: fixed;
      right: 14px;
      bottom: 14px;
      background: var(--dark);
      color: white;
      padding: 13px 15px;
      border-radius: 16px;
      font-size: 13px;
      font-weight: 850;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(18px);
      transition: .2s ease;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,.72);
      display: none;
      place-items: center;
      padding: 14px;
      z-index: 50;
    }

    .modal.open {
      display: grid;
    }

    .modal-box {
      width: min(900px, 100%);
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,.32);
    }

    .modal img {
      width: 100%;
      max-height: 78vh;
      object-fit: contain;
      background: white;
      display: block;
    }

    .modal-footer {
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-weight: 900;
    }

    @media (max-width: 680px) {
      .app { padding: 10px; }
      .hero { border-radius: 22px; padding: 14px; }
      .search { grid-template-columns: 1fr; }
      .search button { min-height: 46px; }
      .grid { grid-template-columns: 1fr; }
      .status { font-size: 11px; }
      .name { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="hero">
        <h1>Catálogo de Produtos Santalmas</h1>
        <div class="search">
          <input id="busca" placeholder="Buscar por código, produto ou descrição..." oninput="render()" autofocus />
          <button onclick="limparBusca()">Limpar</button>
        </div>
        <div class="status">
          <span id="contador">Carregando produtos...</span>
          <span>Google Sheets</span>
        </div>
      </div>
    </header>

    <main class="grid" id="resultado">
      <div class="empty">Carregando catálogo online...</div>
    </main>
  </div>

  <div class="modal" id="modal" onclick="fecharModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <img id="modalImg" alt="Produto ampliado" />
      <div class="modal-footer">
        <span id="modalTitle"></span>
        <button class="btn dark" onclick="fecharModal()">Fechar</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwkAwPdnMka-5rdC6k4cORgkEBC7Hsh68FQ_vbPF1VoXBnch34ckVYqhUR0BMT8vx-_/exec";
    let produtos = [];

    function carregarProdutosJSONP() {
      const callbackName = "receberProdutos_" + Date.now();

      window[callbackName] = function(data) {
        try {
          if (!data || !data.success) {
            throw new Error("Resposta inválida da API");
          }

          produtos = normalizarProdutos(data.produtos || []);
          render();
        } catch (err) {
          mostrarErro(err.message);
        } finally {
          const script = document.getElementById(callbackName);
          if (script) script.remove();
          delete window[callbackName];
        }
      };

      const script = document.createElement("script");
      script.id = callbackName;
      script.src = API_URL + "?callback=" + callbackName + "&t=" + Date.now();
      script.onerror = function() {
        mostrarErro("Falha ao carregar a API.");
      };
      document.body.appendChild(script);
    }

    function normalizarProdutos(lista) {
      return (Array.isArray(lista) ? lista : [])
        .map((p, index) => {
          const codigo = limpar(p.codigo || p["Codigo produto"] || p["Código produto"]);
          const descricao = limpar(p.descricao || p["Descricao produto"] || p["Descrição produto"]);
          const fotoUrl = limpar(p.fotoUrl || p["fotoUrl"]);

          return {
            id: p.id || index + 1,
            codigo,
            nome: limpar(p.nomePopular || p.nomeTecnico || descricao),
            descricao,
            lote: limpar(p["Lote fabricante"] || p.lote || ""),
            validade: formatarValidade(p["Validade lote"] || p.validade || ""),
            palavrasChave: limpar(p.palavrasChave || ""),
            fotoUrl,
            ativo: String(p.ativo || "Sim").toLowerCase()
          };
        })
        .filter(p => p.codigo && p.ativo !== "não" && p.ativo !== "nao" && p.ativo !== "false");
    }

    function limpar(valor) {
      return String(valor ?? "").trim();
    }

    function normalizarTexto(txt) {
      return String(txt || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function formatarValidade(valor) {
      if (!valor) return "";
      const texto = String(valor);
      const data = new Date(texto);
      if (!Number.isNaN(data.getTime())) {
        return data.toLocaleDateString("pt-BR");
      }
      return texto;
    }

    function scoreProduto(produto, termo) {
      if (!termo) return 1;

      const busca = normalizarTexto(termo);
      const campos = {
        codigo: normalizarTexto(produto.codigo),
        nome: normalizarTexto(produto.nome),
        descricao: normalizarTexto(produto.descricao),
        palavrasChave: normalizarTexto(produto.palavrasChave),
        lote: normalizarTexto(produto.lote)
      };

      let score = 0;

      if (campos.codigo === busca) score += 100;
      if (campos.codigo.includes(busca)) score += 70;
      if (campos.nome.includes(busca)) score += 50;
      if (campos.descricao.includes(busca)) score += 45;
      if (campos.palavrasChave.includes(busca)) score += 35;
      if (campos.lote.includes(busca)) score += 20;

      busca.split(" ").filter(Boolean).forEach(palavra => {
        if (campos.nome.includes(palavra)) score += 12;
        if (campos.descricao.includes(palavra)) score += 10;
        if (campos.palavrasChave.includes(palavra)) score += 8;
      });

      return score;
    }

    function getFiltrados() {
      const termo = $("busca").value.trim();

      return produtos
        .map(p => ({ ...p, score: scoreProduto(p, termo) }))
        .filter(p => !termo || p.score > 0)
        .sort((a, b) => b.score - a.score || a.codigo.localeCompare(b.codigo));
    }

    function render() {
      const lista = getFiltrados();

      $("contador").textContent = `${lista.length} produto${lista.length === 1 ? "" : "s"} encontrado${lista.length === 1 ? "" : "s"}`;

      if (!lista.length) {
        $("resultado").innerHTML = `<div class="empty">Nenhum produto encontrado. Tente buscar pelo código, parte do nome ou descrição.</div>`;
        return;
      }

      $("resultado").innerHTML = lista.map(produto => `
        <article class="card">
          <div class="photo">
            ${produto.fotoUrl && produto.fotoUrl !== "SEM FOTO"
              ? `<img src="${escapeHTML(produto.fotoUrl)}" alt="${escapeHTML(produto.nome)}" onclick="abrirImagem('${escapeJS(produto.fotoUrl)}', '${escapeJS(produto.codigo)} - ${escapeJS(produto.nome)}')" onerror="this.parentElement.innerHTML='Sem foto'">`
              : "Sem foto"}
          </div>
          <div class="body">
            <span class="code">${escapeHTML(produto.codigo)}</span>
            <h2 class="name">${escapeHTML(produto.nome || produto.descricao || "Produto sem descrição")}</h2>
            ${produto.descricao && produto.descricao !== produto.nome ? `<div class="small">${escapeHTML(produto.descricao)}</div>` : ""}
            ${produto.lote ? `<div class="small"><strong>Lote:</strong> ${escapeHTML(produto.lote)}</div>` : ""}
            ${produto.validade ? `<div class="small"><strong>Validade:</strong> ${escapeHTML(produto.validade)}</div>` : ""}
            <div class="actions">
              <button class="btn dark" onclick="copiar('${escapeJS(produto.codigo)}')">Copiar código</button>
              <button class="btn" onclick="copiarPedido('${escapeJS(produto.codigo)}', '${escapeJS(produto.nome || produto.descricao)}')">Copiar pedido</button>
            </div>
          </div>
        </article>
      `).join("");
    }

    function limparBusca() {
      $("busca").value = "";
      render();
      $("busca").focus();
    }

    function copiar(texto) {
      navigator.clipboard.writeText(texto).then(() => {
        toast("Código copiado: " + texto);
      }).catch(() => {
        alert("Código: " + texto);
      });
    }

    function copiarPedido(codigo, nome) {
      const texto = `Produto: ${nome}\nCódigo: ${codigo}`;
      navigator.clipboard.writeText(texto).then(() => {
        toast("Pedido copiado.");
      }).catch(() => {
        alert(texto);
      });
    }

    function abrirImagem(src, title) {
      $("modalImg").src = src;
      $("modalTitle").textContent = title;
      $("modal").classList.add("open");
    }

    function fecharModal() {
      $("modal").classList.remove("open");
    }

    function mostrarErro(msg) {
      $("contador").textContent = "Erro ao carregar produtos";
      $("resultado").innerHTML = `<div class="empty">Não consegui carregar o catálogo. ${escapeHTML(msg)}</div>`;
    }

    function toast(msg) {
      const el = $("toast");
      el.textContent = msg;
      el.classList.add("show");
      setTimeout(() => el.classList.remove("show"), 2600);
    }

    function escapeHTML(value) {
      return String(value ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function escapeJS(value) {
      return String(value ?? "")
        .replaceAll("\\", "\\\\")
        .replaceAll("'", "\\'")
        .replaceAll('"', '\\"')
        .replaceAll("\n", "\\n")
        .replaceAll("\r", "");
    }

    function $(id) {
      return document.getElementById(id);
    }

    carregarProdutosJSONP();
  </script>
</body>
</html>
